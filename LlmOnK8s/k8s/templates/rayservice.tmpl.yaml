apiVersion: ray.io/v1
kind: RayService
metadata:
  name: qwen-rayservice
  namespace: ${TENANT_NAMESPACE}
  labels:
    app: qwen-rayservice
    tenant: ${TENANT_NAMESPACE}
spec:
  serveConfigV2: |
    applications:
      - name: qwen-chat
        route_prefix: /
        import_path: serve_app:deployment
        deployments:
          - name: QwenVLLMDeployment
            num_replicas: ${SERVE_REPLICAS}
            max_concurrent_queries: 50
            health_check_period_s: 10
            health_check_timeout_s: 30
            ray_actor_options:
              num_cpus: 4
              num_gpus: ${SERVE_ACTOR_NUM_GPUS}

  rayClusterConfig:
    rayVersion: "2.46.0"
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: 0.0.0.0
      template:
        metadata:
          labels:
            app: qwen-ray-head
            tenant: ${TENANT_NAMESPACE}
        spec:
          nodeSelector:
            workload: gpu-compute
          tolerations:
            - key: workload
              operator: Equal
              value: gpu-compute
              effect: NoExecute
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
            - key: node.kubernetes.io/disk-pressure
              operator: Exists
              effect: NoSchedule
          imagePullSecrets:
            - name: aliyun-registry-secret
          containers:
            - name: ray-head
              image: ${INFERENCE_IMAGE}
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
              env:
                - name: RAY_SERVICE_NAME
                  value: qwen-rayservice
                - name: MODEL_ID
                  value: ${VLLM_MODEL_REF}
                - name: MODEL_DISPLAY_NAME
                  value: ${MODEL_DISPLAY_NAME}
                - name: MODEL_SOURCE
                  value: ${MODEL_SOURCE}
                - name: MODEL_OSS_URI
                  value: ${MODEL_OSS_URI}
                - name: MODEL_LOCAL_PATH
                  value: ${MODEL_LOCAL_PATH}
                - name: OSS_ENDPOINT
                  value: ${OSS_ENDPOINT}
                - name: PIPELINE_PARALLEL_SIZE
                  value: "${PIPELINE_PARALLEL_SIZE}"
                - name: OSS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: oss-credentials
                      key: ACCESS_KEY_ID
                      optional: true
                - name: OSS_ACCESS_KEY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: oss-credentials
                      key: ACCESS_KEY_SECRET
                      optional: true
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hf-token
                      key: HF_TOKEN
                      optional: true
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: ${WORKER_REPLICAS}
        minReplicas: ${WORKER_REPLICAS}
        maxReplicas: ${WORKER_REPLICAS}
        rayStartParams: {}
        template:
          metadata:
            labels:
              app: qwen-ray-worker
              tenant: ${TENANT_NAMESPACE}
          spec:
            nodeSelector:
              workload: gpu-compute
            tolerations:
              - key: workload
                operator: Equal
                value: gpu-compute
                effect: NoExecute
              - key: nvidia.com/gpu
                operator: Equal
                value: "true"
                effect: NoSchedule
            imagePullSecrets:
              - name: aliyun-registry-secret
            containers:
              - name: ray-worker
                image: ${INFERENCE_IMAGE}
                imagePullPolicy: IfNotPresent
                env:
                  - name: RAY_SERVICE_NAME
                    value: qwen-rayservice
                  - name: MODEL_ID
                    value: ${VLLM_MODEL_REF}
                  - name: MODEL_DISPLAY_NAME
                    value: ${MODEL_DISPLAY_NAME}
                  - name: MODEL_SOURCE
                    value: ${MODEL_SOURCE}
                  - name: MODEL_OSS_URI
                    value: ${MODEL_OSS_URI}
                  - name: MODEL_LOCAL_PATH
                    value: ${MODEL_LOCAL_PATH}
                  - name: OSS_ENDPOINT
                    value: ${OSS_ENDPOINT}
                  - name: OSS_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        name: oss-credentials
                        key: ACCESS_KEY_ID
                        optional: true
                  - name: OSS_ACCESS_KEY_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: oss-credentials
                        key: ACCESS_KEY_SECRET
                        optional: true
                  - name: PIPELINE_PARALLEL_SIZE
                    value: "${PIPELINE_PARALLEL_SIZE}"
                  - name: TENSOR_PARALLEL_SIZE
                    value: "${TENSOR_PARALLEL_SIZE}"
                  - name: MAX_MODEL_LEN
                    value: "${MAX_MODEL_LEN}"
                  - name: GPU_MEMORY_UTILIZATION
                    value: "${GPU_MEMORY_UTILIZATION}"
                  - name: VLLM_DTYPE
                    value: ${VLLM_DTYPE}
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-token
                        key: HF_TOKEN
                        optional: true
                resources:
                  requests:
                    cpu: "4"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
                  limits:
                    cpu: "4"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
